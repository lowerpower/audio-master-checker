<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="shell wide">
    <nav class="nav"><a href="/">New run</a></nav>
    <header class="topbar">
      <div>
        <h1>{{ title }}</h1>
        <p>Generated outputs are available below.</p>
      </div>
      <div class="downloads">
        {% for label, href in downloads %}
          <a href="{{ href }}">{{ label }}</a>
        {% endfor %}
      </div>
    </header>
    <article class="report">
      {{ html_report | safe }}
    </article>
  </main>
</body>
</html>
